kind = "web"
previewPath = "/"
title = "Stablecoin Research Hub"
version = "1.0.0"
id = "artifacts/stablecoin-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21738

[services.development]
run = "pnpm --filter @workspace/stablecoin-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stablecoin-hub", "run", "build" ]
publicDir = "artifacts/stablecoin-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21738"
BASE_PATH = "/"
